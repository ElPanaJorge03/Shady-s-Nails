<div class="profile-page">
    <div class="profile-container">

        <div class="page-header">
            <div class="header-icon">💅</div>
            <h1>Mi Perfil</h1>
            <p>Actualiza tu información personal y contraseña</p>
        </div>

        <div class="profile-card">
            <app-loading-spinner *ngIf="loading" [overlay]="true" message="Cargando perfil..."></app-loading-spinner>

            <form [formGroup]="profileForm" (ngSubmit)="onSubmit()" *ngIf="!loading">

                <div class="section-header">
                    <h3>Información Personal</h3>
                </div>

                <div class="form-group">
                    <label for="name">Nombre Completo</label>
                    <input id="name" type="text" formControlName="name" placeholder="Tu nombre">
                    <div class="error-msg"
                        *ngIf="profileForm.get('name')?.touched && profileForm.get('name')?.hasError('required')">
                        El nombre es requerido.
                    </div>
                </div>

                <div class="form-group">
                    <label for="phone">Teléfono / Celular</label>
                    <input id="phone" type="tel" formControlName="phone" placeholder="300 123 4567">
                    <div class="error-msg"
                        *ngIf="profileForm.get('phone')?.touched && profileForm.get('phone')?.hasError('required')">
                        El teléfono es requerido.
                    </div>
                </div>

                <div class="form-group">
                    <label for="email">Correo Electrónico</label>
                    <input id="email" type="email" [value]="currentUser?.email" disabled>
                </div>

                <hr class="section-divider">

                <div class="section-header">
                    <h3>Seguridad</h3>
                </div>
                <p style="font-size: 0.88em; color: #9a7a80; margin-bottom: 1.5rem;">
                    Deja estos campos vacíos si no deseas cambiar tu contraseña.
                </p>

                <div class="form-group">
                    <label for="password">Nueva Contraseña</label>
                    <input id="password" type="password" formControlName="password" placeholder="Nueva contraseña">
                    <div class="error-msg" *ngIf="profileForm.get('password')?.hasError('minlength')">
                        Mínimo 6 caracteres.
                    </div>
                </div>

                <div class="form-group">
                    <label for="confirmPassword">Confirmar Contraseña</label>
                    <input id="confirmPassword" type="password" formControlName="confirmPassword"
                        placeholder="Repite la contraseña">
                    <div class="error-msg"
                        *ngIf="profileForm.hasError('mismatch') && profileForm.get('confirmPassword')?.touched">
                        Las contraseñas no coinciden.
                    </div>
                </div>

                <button type="submit" class="btn-save" [disabled]="profileForm.invalid || submitting">
                    <span *ngIf="!submitting">💾 Guardar Cambios</span>
                    <span *ngIf="submitting">Guardando...</span>
                </button>
            </form>
        </div>

    </div>
</div>
