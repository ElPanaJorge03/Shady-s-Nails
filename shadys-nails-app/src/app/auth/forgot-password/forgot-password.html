<div class="login-page">
    <div class="elegant-backdrop"></div>
    <div class="floating-petals"></div>

    <div class="login-wrapper">
        <div class="login-card-feminine">
            <div class="login-header">
                <div class="logo-wrapper">
                    <svg class="flower-icon" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
                        <path
                            d="M12 2C12 2 13 6 17 8C21 10 22 12 22 12C22 12 18 13 16 17C14 21 12 22 12 22C12 22 11 18 7 16C3 14 2 12 2 12C2 12 6 11 8 7C10 3 12 2 12 2V2Z"
                            fill="url(#paint0_linear)" />
                        <defs>
                            <linearGradient id="paint0_linear" x1="2" y1="2" x2="22" y2="22"
                                gradientUnits="userSpaceOnUse">
                                <stop stop-color="#EAA6AC" />
                                <stop offset="1" stop-color="#B76E79" />
                            </linearGradient>
                        </defs>
                    </svg>
                    <h1>Shady's Nails</h1>
                </div>
                <p class="subtitle">Recuperación de Contraseña</p>
            </div>

            <!-- PASO 1: Ingresar Email -->
            <div *ngIf="step === 1" class="elegant-form">
                <p style="text-align: center; color: var(--fem-text-light); font-size: 0.95rem; margin-bottom: 1.5rem;">
                    Ingresa tu correo electrónico y te enviaremos un código para restablecer tu contraseña.
                </p>

                <div class="form-group">
                    <label for="email">Correo Electrónico</label>
                    <div class="input-wrapper">
                        <input type="email" id="email" [(ngModel)]="email" placeholder="ejemplo@correo.com">
                    </div>
                </div>

                <button class="btn-primary" (click)="onRequestCode()" [disabled]="!email || loading">
                    <span *ngIf="!loading">Enviar Código</span>
                    <span *ngIf="loading" class="btn-loader"></span>
                </button>

                <div class="register-link">
                    <a routerLink="/login">Volver al inicio de sesión</a>
                </div>
            </div>

            <!-- PASO 2: Ingresar Código y Nueva Clave -->
            <div *ngIf="step === 2" class="elegant-form">
                <p
                    style="text-align: center; color: var(--fem-text-light); font-size: 0.9rem; margin-bottom: 1.5rem; line-height: 1.5;">
                    Hemos enviado un código a <strong style="color: var(--fem-text-dark)">{{email}}</strong>.<br>Por
                    favor ingrésalo abajo junto con tu nueva contraseña.
                </p>

                <div class="form-group">
                    <label for="code">Código de 6 dígitos</label>
                    <div class="input-wrapper">
                        <input type="text" id="code" [(ngModel)]="code" placeholder="123456" maxlength="6"
                            style="letter-spacing: 0.2em; text-align: center; font-size: 1.2rem; font-weight: 600;">
                    </div>
                </div>

                <div class="form-group">
                    <label for="password">Nueva Contraseña</label>
                    <div class="input-wrapper">
                        <input type="password" id="password" [(ngModel)]="newPassword"
                            placeholder="Mínimo 6 caracteres">
                    </div>
                </div>

                <div class="form-group">
                    <label for="confirmPassword">Confirmar Nueva Contraseña</label>
                    <div class="input-wrapper">
                        <input type="password" id="confirmPassword" [(ngModel)]="confirmPassword"
                            placeholder="Repetir contraseña">
                    </div>
                </div>

                <button class="btn-primary" (click)="onResetPassword()" [disabled]="!isValidReset() || loading">
                    <span *ngIf="!loading">Actualizar Contraseña</span>
                    <span *ngIf="loading" class="btn-loader"></span>
                </button>

                <div class="register-link">
                    <a href="javascript:void(0)" (click)="step = 1">¿No recibiste el código? Intentar de nuevo</a>
                </div>
            </div>

        </div>
    </div>
</div>
