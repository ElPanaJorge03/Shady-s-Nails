<div class="login-page">
    <div class="elegant-backdrop"></div>
    <div class="floating-petals"></div>

    <div class="login-wrapper">
        <div class="login-card-feminine">
            <div class="login-header">
                <div class="logo-wrapper">
                    <svg class="flower-icon" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
                        <path
                            d="M12 2C12 2 13 6 17 8C21 10 22 12 22 12C22 12 18 13 16 17C14 21 12 22 12 22C12 22 11 18 7 16C3 14 2 12 2 12C2 12 6 11 8 7C10 3 12 2 12 2V2Z"
                            fill="url(#paint0_linear)" />
                        <defs>
                            <linearGradient id="paint0_linear" x1="2" y1="2" x2="22" y2="22"
                                gradientUnits="userSpaceOnUse">
                                <stop stop-color="#EAA6AC" />
                                <stop offset="1" stop-color="#B76E79" />
                            </linearGradient>
                        </defs>
                    </svg>
                    <h1>Shady's Nails</h1>
                </div>
                <p class="subtitle">Bienvenida a nuestro exclusivo santuario de belleza</p>
            </div>

            <form [formGroup]="loginForm" (ngSubmit)="onSubmit()" class="elegant-form">
                <div class="form-group">
                    <label for="email">Correo Electrónico</label>
                    <div class="input-wrapper">
                        <input type="email" id="email" formControlName="email" placeholder="tu@email.com"
                            [class.error]="loginForm.get('email')?.invalid && loginForm.get('email')?.touched" />
                    </div>
                    <span class="error-message"
                        *ngIf="loginForm.get('email')?.invalid && loginForm.get('email')?.touched">
                        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                            <path d="M12 8v4m0 4h.01M21 12a9 9 0 11-18 0 9 9 0 0118 0z" stroke-linecap="round"
                                stroke-linejoin="round" />
                        </svg>
                        Email inválido
                    </span>
                </div>

                <div class="form-group">
                    <label for="password">Contraseña</label>
                    <div class="input-wrapper">
                        <input type="password" id="password" formControlName="password" placeholder="••••••••"
                            [class.error]="loginForm.get('password')?.invalid && loginForm.get('password')?.touched" />
                    </div>
                    <span class="error-message"
                        *ngIf="loginForm.get('password')?.invalid && loginForm.get('password')?.touched">
                        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                            <path d="M12 8v4m0 4h.01M21 12a9 9 0 11-18 0 9 9 0 0118 0z" stroke-linecap="round"
                                stroke-linejoin="round" />
                        </svg>
                        Mínimo 6 caracteres
                    </span>
                </div>

                <div class="forgot-password">
                    <a routerLink="/forgot-password">Olvidé mi contraseña</a>
                </div>

                <app-loading-spinner *ngIf="loading" [overlay]="true" message="Accediendo..."></app-loading-spinner>

                <button type="submit" [disabled]="loginForm.invalid || loading" class="btn-primary">
                    <span *ngIf="!loading">Ingresar a mi cuenta</span>
                    <span *ngIf="loading" class="btn-loader"></span>
                </button>

                <div class="divider">
                    <span>o accede con</span>
                </div>

                <div id="google-btn" class="google-login-container"></div>
            </form>

            <div class="register-link">
                ¿Aún no tienes cuenta? <a routerLink="/register">Descubre nuestros servicios</a>
            </div>
        </div>
    </div>
</div>
